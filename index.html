<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cottage on the Rocks - Guest Manual</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        #adobe-dc-view {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="adobe-dc-view"></div>

    <script src="https://acrobatservices.adobe.com/view-sdk/viewer.js"></script>
    <script type="text/javascript">
        document.addEventListener("adobe_dc_view_sdk.ready", function(){ 
            var adobeDCView = new AdobeDC.View({
                /* Quotes added around your ID below */
                clientId: "01008f2ad17b487284a51f81a4c6d9a9", 
                divId: "adobe-dc-view"
            });
            adobeDCView.previewFile({
                content:{
                    location: {
                        /* Changed document.pdf to manual.pdf to match your GitHub file */
                        url: "https://cottageontherocks.ca/manual.pdf"
                    }
                },
                metaData:{
                    fileName: "Cottage on the Rocks - Guest Manual.pdf"
                }
            }, { 
                embedMode: "FULL_WINDOW",
                showAnnotationTools: false,
                showLeftHandPanel: true,
                showDownloadPDF: true,
                showPrintPDF: true
            });
        });
    </script>

</body>
</html>
